<div id="chatbox-container" class="chatbox-container">
    <div class="chatbox-header" onclick="toggleChatbox()">
        <span class="chatbox-title">Chat AI-GIS </span>
        <span class="chatbox-toggle" id="chatbox-toggle"></span>
    </div>
    <div class="chatbox-content" id="chatbox-content">
        <div class="chatbox-messages" id="chatbox-messages">
            <div class="message bot-message">
                ¡Hola! Soy tu asistente de IA. ¿En qué puedo ayudarte?
            </div>
        </div>
        <div class="chatbox-input-container">
            <input type="text" id="chatbox-input" placeholder="Escribe tu mensaje..." onkeypress="handleChatboxEnter(event)">
            <button onclick="sendMessage()" class="chatbox-send-btn">Enviar</button>
        </div>
    </div>
</div>

<script>
let chatboxMinimized = false;

function toggleChatbox() {
    const content = document.getElementById('chatbox-content');
    const toggle = document.getElementById('chatbox-toggle');
    
    chatboxMinimized = !chatboxMinimized;
    
    if (chatboxMinimized) {
        content.style.display = 'none';
        toggle.textContent = '+';
    } else {
        content.style.display = 'flex';
        toggle.textContent = '';
    }
}

function handleChatboxEnter(event) {
    if (event.key === 'Enter') {
        sendMessage();
    }
}

// 📝 Función para formatear Markdown básico
function formatMarkdown(text) {
    if (!text) return '';
    
    return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') // **negrita**
        .replace(/\*(.+?)\*/g, '<em>$1</em>') // *cursiva*
        .replace(/\n/g, '<br/>') // saltos de línea
        .replace(/^- (.+)$/gm, '• $1'); // listas
}

// 🗺️ Función para mostrar buffer en el mapa
function showBufferOnMap(geojson) {
    if (window.showBufferResultOnMap) {
        window.showBufferResultOnMap(geojson);
        console.log('✅ Buffer mostrado en el mapa');
    } else {
        console.warn('⚠️ Función showBufferResultOnMap no disponible');
        alert('La funcionalidad de visualización en el mapa no está disponible');
    }
}

// 
// FUNCIONALIDAD EXISTENTE: Análisis de capas
// 
function getLayersData() {
    if (window.layersAnalysisData) {
        return window.layersAnalysisData;
    }
    return {
        totalLayers: 0,
        polygonLayers: 0,
        lineLayers: 0,
        pointLayers: 0
    };
}

// 
//  NUEVA: Obtener GeoJSON de todas las capas cargadas
// 
function getAllLayersGeojson() {
    if (window.getAllLayersData) {
        const allLayers = window.getAllLayersData();
        console.log('📊 Capas disponibles para análisis:', allLayers);
        return allLayers;
    }
    console.warn('⚠️ window.getAllLayersData no está disponible');
    return null;
}

// 
// NUEVA: Detectar si es una consulta de conteo
// 
function isCountRequest(message) {
    const messageLower = message.toLowerCase();
    const countKeywords = [
        'cuánto', 'cuanto', 'cuántas', 'cuantas',
        'cantidad', 'número', 'numero', 'total',
        'contar', 'cuenta', 'hay', 'capa'
    ];
    return countKeywords.some(keyword => messageLower.includes(keyword));
}

// 
// NUEVA FUNCIONALIDAD: Detección de solicitudes de buffer
// 
function isBufferRequest(message) {
    const messageLower = message.toLowerCase();
    const bufferKeywords = ['buffer', 'área de influencia', 'zona de influencia', 'radio', 'genera', 'crear'];
    const hasBufferKeyword = bufferKeywords.some(keyword => messageLower.includes(keyword));
    const hasDistance = /\d+\s*(metros?|m\b|kilómetros?|kilometros?|km|pies?|ft|feet|millas?|miles?|mi)/i.test(messageLower);
    
    return hasBufferKeyword && hasDistance;
}

async function sendMessage() {
    const input = document.getElementById('chatbox-input');
    const messagesContainer = document.getElementById('chatbox-messages');
    
    if (input.value.trim() === '') return;
    
    const userMessageText = input.value.trim();
    
    // Agregar mensaje del usuario
    const userMessage = document.createElement('div');
    userMessage.className = 'message user-message';
    userMessage.textContent = userMessageText;
    messagesContainer.appendChild(userMessage);
    
    // Limpiar input y scroll
    input.value = '';
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    // Mostrar indicador de escritura
    const typingIndicator = document.createElement('div');
    typingIndicator.className = 'message bot-message typing-indicator';
    typingIndicator.innerHTML = '<span class="typing-dots"></span> Escribiendo...';
    messagesContainer.appendChild(typingIndicator);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    try {
        let requestBody = {
            message: userMessageText
        };

        // 
        // 🎯 PRIORIDAD 1: Verificar si es solicitud de buffer
        // 
        if (isBufferRequest(userMessageText)) {
            console.log('🎯 Solicitud de buffer detectada');
            
            // Obtener datos del buffer desde React
            if (window.createBufferFromChat) {
                const bufferData = await window.createBufferFromChat(userMessageText);
                
                if (bufferData.success) {
                    requestBody.bufferRequest = bufferData.bufferRequest;
                    requestBody.targetLayers = bufferData.targetLayers;
                    requestBody.layersGeojson = bufferData.layersGeojson;
                    console.log('📤 Enviando solicitud de buffer:', {
                        message: requestBody.message,
                        bufferRequest: requestBody.bufferRequest,
                        targetLayers: requestBody.targetLayers,
                        layersGeojson: `${bufferData.layersGeojson?.features?.length || 0} features`
                    });
                } else {
                    // Mostrar mensaje de error directamente
                    messagesContainer.removeChild(typingIndicator);
                    const errorMessage = document.createElement('div');
                    errorMessage.className = 'message bot-message';
                    errorMessage.textContent = bufferData.message;
                    messagesContainer.appendChild(errorMessage);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    return;
                }
            } else {
                console.warn('⚠️ window.createBufferFromChat no está disponible');
            }
        } 
        // 
        //  🔢 PRIORIDAD 2: Detectar consultas de conteo (enviar layersData)
        // 
        else if (isCountRequest(userMessageText)) {
            console.log('🔢 Solicitud de conteo detectada');
            
            const layersData = getLayersData();
            const allLayersGeojson = getAllLayersGeojson();
            
            // Agregar datos de capas para el agente contador
            requestBody.layersData = layersData;
            if (allLayersGeojson && allLayersGeojson.length > 0) {
                requestBody.layersGeojson = allLayersGeojson;
            }
            
            console.log('📤 Enviando consulta de conteo:', {
                message: requestBody.message,
                layersData: requestBody.layersData,
                layersCount: allLayersGeojson?.length || 0
            });
        }
        // 
        // 💬 PRIORIDAD 3: Consultas generales (SOLO mensaje)
        // 
        else {
            console.log('💬 Consulta general - Solo mensaje:', requestBody);
        }
        
        // 📡 Llamar al orquestador del backend
        console.log('📡 Enviando al orquestador:', requestBody);
        const response = await fetch('http://localhost:5000/api/v1/orchestrator', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Basic Og=='
            },
            body: JSON.stringify(requestBody)
        });
        
        // Remover indicador de escritura
        messagesContainer.removeChild(typingIndicator);
        
        if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
        }

        const data = await response.json();
        console.log('📥 Respuesta del backend:', data);

        // 🎨 PROCESAR RESPUESTA SEGÚN EL AGENTE
        const botMessage = document.createElement('div');
        botMessage.className = 'message bot-message';

        // Verificar si tiene la nueva estructura del orquestador
        if (data.success !== undefined && data.agent) {
            // ✅ NUEVA ESTRUCTURA CON ORQUESTADOR
            if (data.success) {
                // 🔢 Respuesta del AgenteConteo
                if (data.agent === 'AgenteConteo') {
                    botMessage.innerHTML = `
                        <div style="padding: 12px; background: #f8f9fa; border-radius: 8px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #2196F3;">
                                <span style="font-size: 24px;">🔢</span>
                                <strong style="color: #2196F3; font-size: 16px;">Agente de Conteo</strong>
                            </div>
                            <div style="background: white; padding: 12px; border-radius: 6px; margin-bottom: 12px; border-left: 4px solid #2196F3;">
                                ${formatMarkdown(data.result)}
                            </div>
                            ${data.count !== undefined ? `
                                <div style="text-align: center; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; margin-bottom: 12px;">
                                    <div style="color: white; font-size: 14px; margin-bottom: 4px;">Total de Capas</div>
                                    <div style="color: white; font-size: 36px; font-weight: bold;">${data.count}</div>
                                </div>
                            ` : ''}
                            ${data.metadata ? `
                                <div style="background: white; padding: 10px; border-radius: 6px; font-size: 13px; color: #666;">
                                    <strong style="color: #333; display: block; margin-bottom: 8px;">📊 Desglose Detallado:</strong>
                                    <div style="display: grid; gap: 6px;">
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <span style="color: #4CAF50; font-size: 18px;">📚</span>
                                            <span><strong>${data.metadata.totalLayers}</strong> capa(s) en total</span>
                                        </div>
                                        ${data.metadata.polygonLayers > 0 ? `
                                            <div style="display: flex; align-items: center; gap: 8px;">
                                                <span style="color: #2196F3; font-size: 18px;">🔷</span>
                                                <span><strong>${data.metadata.polygonLayers}</strong> de polígonos</span>
                                            </div>
                                        ` : ''}
                                        ${data.metadata.lineLayers > 0 ? `
                                            <div style="display: flex; align-items: center; gap: 8px;">
                                                <span style="color: #FF9800; font-size: 18px;">📏</span>
                                                <span><strong>${data.metadata.lineLayers}</strong> de líneas</span>
                                            </div>
                                        ` : ''}
                                        ${data.metadata.pointLayers > 0 ? `
                                            <div style="display: flex; align-items: center; gap: 8px;">
                                                <span style="color: #F44336; font-size: 18px;">📍</span>
                                                <span><strong>${data.metadata.pointLayers}</strong> de puntos</span>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                // 🎯 Respuesta del AgenteBuffer
                else if (data.agent === 'AgenteBuffer') {
                    botMessage.innerHTML = `
                        <div style="padding: 12px; background: #f8f9fa; border-radius: 8px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #4CAF50;">
                                <span style="font-size: 24px;">🎯</span>
                                <strong style="color: #4CAF50; font-size: 16px;">Agente de Buffer</strong>
                            </div>
                            <div style="background: white; padding: 12px; border-radius: 6px; border-left: 4px solid #4CAF50;">
                                ${formatMarkdown(data.result || data.message)}
                            </div>
                            ${data.geojson || data.bufferGeojson ? `
                                <button onclick="showBufferOnMap(${JSON.stringify(data.geojson || data.bufferGeojson).replace(/"/g, '&quot;')})" 
                                        style="margin-top: 12px; padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;">
                                    📍 Ver en el Mapa
                                </button>
                            ` : ''}
                        </div>
                    `;
                    
                    // Agregar capa de buffer al mapa automáticamente
                    if (data.newLayerId && data.bufferGeojson && window.addBufferLayerToMap) {
                        window.addBufferLayerToMap(data.newLayerId, data.layerName, data.bufferGeojson);
                        console.log('✅ Capa de buffer agregada al mapa');
                    }
                }
                // 🔍 Respuesta de otros agentes (consulta, etc.)
                else {
                    botMessage.innerHTML = `
                        <div style="padding: 12px; background: #f8f9fa; border-radius: 8px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #FF9800;">
                                <span style="font-size: 24px;">🤖</span>
                                <strong style="color: #FF9800; font-size: 16px;">${data.agent || 'Asistente'}</strong>
                            </div>
                            <div style="background: white; padding: 12px; border-radius: 6px; border-left: 4px solid #FF9800;">
                                ${formatMarkdown(data.result || data.message || data.response || 'Respuesta recibida')}
                            </div>
                        </div>
                    `;
                }
            } else {
                // ❌ Error del backend con orquestador
                botMessage.innerHTML = `
                    <div style="padding: 12px; background: #FFEBEE; border-left: 4px solid #F44336; border-radius: 6px;">
                        <strong style="color: #D32F2F; font-size: 16px;">⚠️ Error</strong><br/>
                        <span style="color: #666; font-size: 14px;">${data.message || data.error || 'Ha ocurrido un error procesando tu solicitud'}</span>
                    </div>
                `;
            }
        } else {
            // 📄 ESTRUCTURA ANTIGUA/SIMPLE - Compatibilidad con backend anterior
            let messageText = '';
            
            if (typeof data === 'string') {
                messageText = data;
            } else if (data.result) {
                messageText = data.result;
            } else if (data.reply) {
                messageText = data.reply;
            } else if (data.response) {
                messageText = data.response;
            } else if (data.message) {
                messageText = data.message;
            } else {
                messageText = 'Respuesta recibida del servidor';
            }
            
            botMessage.innerHTML = `
                <div style="padding: 12px;">
                    ${formatMarkdown(messageText)}
                </div>
            `;
            
            // Verificar si hay buffer para agregar al mapa (compatibilidad)
            if (data.newLayerId && data.bufferGeojson && window.addBufferLayerToMap) {
                window.addBufferLayerToMap(data.newLayerId, data.layerName, data.bufferGeojson);
                console.log('✅ Capa de buffer agregada al mapa');
            }
        }

        messagesContainer.appendChild(botMessage);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
    } catch (error) {
        // Remover indicador de escritura en caso de error
        if (messagesContainer.contains(typingIndicator)) {
            messagesContainer.removeChild(typingIndicator);
        }
        
        // Mostrar mensaje de error de conexión
        const errorMessage = document.createElement('div');
        errorMessage.className = 'message bot-message';
        errorMessage.innerHTML = `
            <div style="padding: 12px; background: #FFEBEE; border-left: 4px solid #F44336; border-radius: 6px;">
                <strong style="color: #D32F2F; font-size: 16px;">⚠️ Error de Conexión</strong><br/>
                <span style="color: #666; font-size: 14px;">${error.message}</span><br/>
                <small style="color: #999; font-size: 12px; margin-top: 8px; display: block;">
                    Verifica que el servidor backend esté ejecutándose en <strong>http://localhost:5000</strong>
                </small>
            </div>
        `;
        messagesContainer.appendChild(errorMessage);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        console.error('❌ Error conectando con el API:', error);
    }
}
</script>
